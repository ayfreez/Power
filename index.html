<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PowerLog"/>
  <meta name="theme-color" content="#030712"/>
  <title>PowerLog</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;
      overflow:hidden;
      background:#030712;
      font-family:system-ui,-apple-system,sans-serif;
      color:#e2e8f0;
      overscroll-behavior:none;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
    }
    #app{
      position:fixed;
      top:0;right:0;bottom:0;left:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }
    #safe-top{
      flex-shrink:0;
      height:env(safe-area-inset-top);
      min-height:env(safe-area-inset-top);
      background:rgba(3,7,18,.97);
    }
    #safe-bottom{
      display:none;
    }
    /* scrollbar */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:#4f46e5;border-radius:2px}
    /* inputs */
    input[type=number]{-moz-appearance:textfield;outline:none}
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    /* animations */
    @keyframes pulse{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .page{animation:fadein .2s ease}
    /* safe area header et nav */
    #header{
      padding-top:12px;
      padding-left:16px;
      padding-right:16px;
      padding-bottom:10px;
    }
    #bottomnav{padding-bottom:8px}
    /* buttons */
    button{cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none}
    /* cards */
    .card{background:#111827;border:1px solid #1f2937;border-radius:12px;padding:16px}
    /* badge */
    .badge{display:inline-flex;align-items:center;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
    /* pill */
    .pill{border-radius:8px;padding:6px 12px;font-size:12px;white-space:nowrap;cursor:pointer}
    /* active tab */
    .nav-btn{flex:1;background:transparent;border:none;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px}
    /* scroll container */
    #content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
    #inner{max-width:600px;margin:0 auto;padding:14px 14px 20px 14px}
  </style>
</head>
<body>
<div id="app">

  <!-- SAFE AREA TOP -->
  <div id="safe-top"></div>

  <!-- LOADING -->
  <div id="loading" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
    <div style="font-size:28px;font-weight:900;letter-spacing:4px">
      <span style="color:#818cf8">POWER</span><span style="color:#e2e8f0">LOG</span>
    </div>
    <div style="display:flex;gap:6px">
      <div style="width:8px;height:8px;border-radius:50%;background:#4f46e5;animation:pulse 1s 0s infinite ease-in-out"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#4f46e5;animation:pulse 1s .2s infinite ease-in-out"></div>
      <div style="width:8px;height:8px;border-radius:50%;background:#4f46e5;animation:pulse 1s .4s infinite ease-in-out"></div>
    </div>
    <div style="font-size:10px;color:#374151;letter-spacing:2px">CHARGEMENT...</div>
  </div>

  <!-- MAIN (hidden until ready) -->
  <div id="main" style="display:none;flex-direction:column;flex:1;overflow:hidden">

    <!-- HEADER -->
    <div id="header" style="flex-shrink:0;background:rgba(3,7,18,.97);border-bottom:1px solid #1f2937;padding:10px 16px;display:flex;align-items:center;justify-content:space-between">
      <div onclick="goTab('blocks')" style="cursor:pointer">
        <div style="font-size:22px;font-weight:900;letter-spacing:3px;line-height:1">
          <span style="color:#818cf8">POWER</span><span style="color:#e2e8f0">LOG</span>
        </div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          <div style="width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e"></div>
          <span style="font-size:9px;color:#374151;letter-spacing:2px">LOCAL STORAGE</span>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div id="content">
      <div id="inner">
        <div id="tab-profile" class="page" style="display:none"></div>
        <div id="tab-blocks" class="page"></div>
        <div id="tab-session" class="page" style="display:none"></div>
        <div id="tab-history" class="page" style="display:none"></div>
        <div id="tab-settings" class="page" style="display:none"></div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <div id="bottomnav" style="flex-shrink:0;background:rgba(3,7,18,.98);border-top:1px solid #1f2937;display:flex">
      <button class="nav-btn" onclick="goTab('profile')" id="nav-profile">
        <span style="font-size:20px">👤</span>
        <span style="font-size:9px;letter-spacing:1px">PROFIL</span>
      </button>
      <button class="nav-btn" onclick="goTab('blocks')" id="nav-blocks">
        <span style="font-size:20px">🧱</span>
        <span style="font-size:9px;letter-spacing:1px">BLOCS</span>
      </button>
      <button class="nav-btn" onclick="goTab('session')" id="nav-session">
        <span style="font-size:20px">🏋️</span>
        <span style="font-size:9px;letter-spacing:1px">SÉANCE</span>
      </button>
      <button class="nav-btn" onclick="goTab('history')" id="nav-history">
        <span style="font-size:20px">📊</span>
        <span style="font-size:9px;letter-spacing:1px">HISTORIQUE</span>
      </button>
      <button class="nav-btn" onclick="goTab('settings')" id="nav-settings">
        <span style="font-size:20px">⚙️</span>
        <span style="font-size:9px;letter-spacing:1px">CONFIG</span>
      </button>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-end;justify-content:center" onclick="closeModal()">
    <div id="modal-box" style="background:#111827;border-top:1.5px solid #818cf8;border-left:1.5px solid #818cf8;border-right:1.5px solid #818cf8;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:600px;max-height:85vh;overflow-y:auto" onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- SAFE AREA BOTTOM -->
  <div id="safe-bottom"></div>

</div>

<script>
// ── RPE TABLE ────────────────────────────────────────────────────────────────

  2:{10:0.955,9.5:0.939,9:0.922,8.5:0.907,8:0.892,7.5:0.878,7:0.863,6.5:0.850,6:0.837},
  3:{10:0.922,9.5:0.907,9:0.892,8.5:0.878,8:0.863,7.5:0.850,7:0.837,6.5:0.824,6:0.811},
  4:{10:0.892,9.5:0.878,9:0.863,8.5:0.850,8:0.837,7.5:0.824,7:0.811,6.5:0.798,6:0.785},
  5:{10:0.863,9.5:0.850,9:0.837,8.5:0.824,8:0.811,7.5:0.798,7:0.785,6.5:0.773,6:0.762},
  6:{10:0.837,9.5:0.824,9:0.811,8.5:0.798,8:0.785,7.5:0.773,7:0.762,6.5:0.750,6:0.738},
  7:{10:0.811,9.5:0.798,9:0.785,8.5:0.773,8:0.762,7.5:0.750,7:0.738,6.5:0.727,6:0.714},
  8:{10:0.785,9.5:0.773,9:0.762,8.5:0.750,8:0.738,7.5:0.727,7:0.714,6.5:0.702,6:0.690},
  9:{10:0.762,9.5:0.750,9:0.738,8.5:0.727,8:0.714,7.5:0.702,7:0.690,6.5:0.680,6:0.668},
  10:{10:0.738,9.5:0.727,9:0.714,8.5:0.702,8:0.690,7.5:0.680,7:0.668,6.5:0.656,6:0.645},
};
function calcE1RM(w,r,rpe){
  const row=RT[Math.min(Math.round(r),10)];
  if(!row)return w;
  const p=row[Math.round(rpe*2)/2];
  return p?Math.round(w/p):w;
}
function calcSuggest(e1rm,r,rpe){
  const row=RT[Math.min(Math.round(r),10)];
  if(!row)return null;
  const p=row[Math.round(rpe*2)/2];
  return p?Math.round((e1rm*p)/2.5)*2.5:null;
}

const RPE_COLOR={6:"#22c55e",6.5:"#22c55e",7:"#86efac",7.5:"#eab308",8:"#f97316",8.5:"#ef4444",9:"#dc2626",9.5:"#991b1b",10:"#7f1d1d"};
const RPE_LABEL={6:"Très facile",6.5:"Facile",7:"Modéré",7.5:"Confortable",8:"Difficile",8.5:"Très difficile",9:"Presque max",9.5:"Max-1",10:"Maximum"};
const rpeC=r=>RPE_COLOR[r]||"#94a3b8";
const LEVEL_COLOR={Débutant:"#22c55e",Intermédiaire:"#eab308",Avancé:"#ef4444",Spécial:"#a855f7","Mon Programme":"#818cf8"};

// ── BLOCKS ───────────────────────────────────────────────────────────────────
const BLOCKS = [
  // ── BLOCS PERSONNALISÉS ───────────────────────────────────────────────────
  {id:"perso_reprise",emoji:"🔄",name:"PHASE 1 — REPRISE",inspo:"Programme personnalisé · 26 ans · 115kg",color:"#22c55e",weeks:8,level:"Mon Programme",
   desc:"Bloc de reprise sur mesure après 2 ans d'arrêt. Objectif : retrouver les sensations, réhabituer le corps aux charges, exploiter la mémoire musculaire. Toujours 3-4 reps en réserve, aucune série à l'échec. RPE 6 = très facile, c'est voulu.",
   notes:"🎯 Objectif : technique parfaite + retrouver les sensations\n📹 Filme tes séries de squat, bench et deadlift régulièrement\n🚶 8 000 à 10 000 pas par jour si possible\n🥗 Déficit calorique léger — cible 0.3 à 0.8kg/semaine",
   days:[
     {name:"Jour 1",label:"Squat / Bench",exs:[{l:"Squat",s:5,r:5,rpe:6},{l:"Bench Press",s:5,r:5,rpe:6},{l:"Rowing",s:4,r:8,rpe:6}]},
     {name:"Jour 2",label:"DL / Bench serré",exs:[{l:"Deadlift",s:4,r:5,rpe:6},{l:"Bench Serré",s:4,r:6,rpe:6},{l:"Tirage Vertical",s:4,r:8,rpe:6}]},
     {name:"Jour 3",label:"Squat pause / Bench",exs:[{l:"Squat Pause",s:4,r:4,rpe:6},{l:"Bench Press",s:6,r:4,rpe:6},{l:"Romanian DL",s:3,r:8,rpe:6}]},
   ],
   wp:[{lbl:"S1 Intro",ro:0,vm:0.8},{lbl:"S2",ro:0,vm:0.9},{lbl:"S3",ro:0,vm:1},{lbl:"S4",ro:0,vm:1},{lbl:"S5",ro:0.5,vm:1},{lbl:"S6",ro:0.5,vm:1},{lbl:"S7",ro:0.5,vm:1},{lbl:"Deload",ro:-1,vm:0.6}]},

  {id:"perso_transition",emoji:"⚡",name:"PHASE 2 — TRANSITION PL",inspo:"Programme personnalisé · Semaine 7-9",color:"#f59e0b",weeks:6,level:"Mon Programme",
   desc:"Introduction du travail spécifique powerlifting. Top single suivi de back-off sets. Objectif : réapprendre à manipuler des charges lourdes et construire l'e1RM sans tester un vrai max.",
   notes:"🎯 Top single @ RPE 6-7 puis back-off sets\n📈 L'e1RM va s'affiner semaine après semaine\n⚖️ Continuer déficit calorique — régularité avant tout\n📹 Continuer à filmer les mouvements",
   days:[
     {name:"Jour 1",label:"Squat top single",exs:[{l:"Squat",s:1,r:1,rpe:7},{l:"Squat",s:4,r:5,rpe:7},{l:"Bench Press",s:3,r:5,rpe:6}]},
     {name:"Jour 2",label:"Bench top single",exs:[{l:"Bench Press",s:1,r:1,rpe:7},{l:"Bench Press",s:5,r:5,rpe:7},{l:"Deadlift",s:3,r:4,rpe:6}]},
     {name:"Jour 3",label:"DL top single",exs:[{l:"Deadlift",s:1,r:1,rpe:7},{l:"Deadlift",s:4,r:4,rpe:7},{l:"Bench Press",s:3,r:4,rpe:7}]},

   days:[
     {name:"Jour 1",label:"Squat / Bench",exs:[{l:"Squat",s:5,r:5,rpe:7},{l:"Bench Press",s:5,r:5,rpe:7},{l:"Romanian DL",s:3,r:6,rpe:6}]},
     {name:"Jour 2",label:"DL / Bench",exs:[{l:"Deadlift",s:4,r:5,rpe:7},{l:"Bench Press",s:4,r:6,rpe:7},{l:"Squat",s:3,r:5,rpe:6}]},
     {name:"Jour 3",label:"Full volume",exs:[{l:"Squat",s:4,r:6,rpe:7},{l:"Bench Press",s:5,r:6,rpe:7},{l:"Deadlift",s:3,r:5,rpe:7}]},
   ],
   wp:[{lbl:"Intro",ro:0,vm:0.8},{lbl:"Vol.",ro:0,vm:1},{lbl:"Vol.+",ro:0.5,vm:1},{lbl:"Surcharge",ro:0.5,vm:1.1},{lbl:"Intens.",ro:0.5,vm:0.9},{lbl:"Deload",ro:-2,vm:0.5}]},

  {id:"perso_intens",emoji:"🔥",name:"PHASE 3B — INTENSIFICATION",inspo:"Programme personnalisé · Bloc 2",color:"#f97316",weeks:4,level:"Mon Programme",
   desc:"Charges plus lourdes, RPE 7-8.5. Travail principal en 3-4 reps. Les acquis du bloc accumulation se transforment en force brute. Volume réduit, intensité maximisée.",
   notes:"🎯 RPE 7 à 8.5 — c'est censé être difficile\n📈 L'e1RM devrait bien progresser ici\n⚖️ Maintenir le déficit — la force progresse même en déficit\n💊 Protéines en priorité pour préserver le muscle",
   days:[
     {name:"Jour 1",label:"Squat / Bench",exs:[{l:"Squat",s:4,r:4,rpe:7.5},{l:"Bench Press",s:4,r:4,rpe:7.5},{l:"Deadlift",s:2,r:3,rpe:7}]},
     {name:"Jour 2",label:"DL / Bench",exs:[{l:"Deadlift",s:3,r:3,rpe:8},{l:"Bench Press",s:3,r:4,rpe:8},{l:"Squat",s:3,r:4,rpe:7.5}]},
     {name:"Jour 3",label:"Full lourd",exs:[{l:"Squat",s:3,r:3,rpe:8.5},{l:"Bench Press",s:3,r:3,rpe:8.5},{l:"Deadlift",s:3,r:3,rpe:8}]},
   ],
   wp:[{lbl:"Transition",ro:0,vm:1},{lbl:"Intens.",ro:0.5,vm:0.9},{lbl:"Intens.+",ro:1,vm:0.8},{lbl:"Deload",ro:-2,vm:0.5}]},

  {id:"perso_peak",emoji:"🔺",name:"PHASE 3C — PEAK",inspo:"Programme personnalisé · Bloc 3",color:"#ef4444",weeks:3,level:"Mon Programme",
   desc:"Singles lourds, volume réduit. Préparation à un test de max ou à une compétition. 2-3 semaines seulement. Chaque séance compte.",
   notes:"🎯 Singles à RPE 8-9 — réapprendre à être lourd\n🏆 Objectif : tester un e1RM fiable ou participer à une compét'\n⚖️ Légère remontée calorique possible pour performer\n😴 Sommeil et récupération prioritaires",

     {name:"Jour 3",label:"Jour lourd",exs:[{l:"Squat",s:1,r:1,rpe:9},{l:"Bench Press",s:1,r:1,rpe:9},{l:"Deadlift",s:1,r:1,rpe:9}]},
   ],
   wp:[{lbl:"Entrée",ro:0,vm:0.9},{lbl:"Pic",ro:0.5,vm:0.8},{lbl:"Test",ro:0,vm:0.5}]},

  {id:"perso_consolidation",emoji:"🔒",name:"CONSOLIDATION",inspo:"Programme personnalisé · Après le Peak",color:"#06b6d4",weeks:6,level:"Mon Programme",

   notes:"🎯 Consolider sans forcer — la fatigue du peak est encore là\n📊 Compare tes e1RM avec ceux du début du premier cycle\n⚖️ Continuer le déficit calorique\n😴 Sommeil prioritaire — la récup est la clé ici",
   days:[
     {name:"Jour 1",label:"Squat / Bench",exs:[{l:"Squat",s:4,r:4,rpe:7.5},{l:"Bench Press",s:4,r:4,rpe:7.5},{l:"Romanian DL",s:3,r:6,rpe:7}]},
     {name:"Jour 2",label:"Bench / DL",exs:[{l:"Bench Press",s:5,r:4,rpe:8},{l:"Deadlift",s:3,r:3,rpe:7.5},{l:"Rowing",s:4,r:6,rpe:7}]},
     {name:"Jour 3",label:"DL / Full",exs:[{l:"Deadlift",s:4,r:3,rpe:8},{l:"Squat",s:3,r:3,rpe:7.5},{l:"Bench Press",s:3,r:4,rpe:7.5}]},

   notes:"🎯 RPE 8 à 9 — tu es prêt pour ça maintenant\n📈 Tes e1RM doivent être bien supérieurs au début\n⚖️ Légère remontée calorique possible si tu stagnes\n🏆 Objectif fin de bloc : nouveau test ou compét'",
   days:[
     {name:"Jour 1",label:"Squat / Bench",exs:[{l:"Squat",s:4,r:3,rpe:8},{l:"Bench Press",s:4,r:3,rpe:8},{l:"Deadlift",s:2,r:3,rpe:7}]},
     {name:"Jour 2",label:"Full modéré",exs:[{l:"Bench Press",s:5,r:3,rpe:8.5},{l:"Squat",s:3,r:3,rpe:8},{l:"Romanian DL",s:3,r:5,rpe:7.5}]},
     {name:"Jour 3",label:"Jour lourd",exs:[{l:"Deadlift",s:3,r:2,rpe:8.5},{l:"Squat",s:2,r:2,rpe:9},{l:"Bench Press",s:3,r:2,rpe:8.5}]},
   ],
   wp:[{lbl:"Intro lourd",ro:0,vm:0.9},{lbl:"Lourd",ro:0.5,vm:1},{lbl:"Très lourd",ro:1,vm:0.9},{lbl:"Pic",ro:1.5,vm:0.8},{lbl:"Deload",ro:-2,vm:0.5}]},
];

// ── STATE ────────────────────────────────────────────────────────────────────
let STATE = {
  tab:"blocks",
  activeId:null, week:0, dayIdx:0,
  log:{}, saving:false, saved:false,
  levelFilter:"Mon Programme",
  history:[], e1rms:{},
};

function load(){
  try{const h=localStorage.getItem("pl_hist");if(h)STATE.history=JSON.parse(h);}catch(e){}
  try{const e=localStorage.getItem("pl_e1rm");if(e)STATE.e1rms=JSON.parse(e);}catch(e){}
  try{const s=localStorage.getItem("pl_st");if(s){const p=JSON.parse(s);STATE.activeId=p.id||null;STATE.week=p.week||0;STATE.dayIdx=p.day||0;}}catch(e){}
}
function save(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getExs(block,wk,di){
  const w=block.wp[wk],d=block.days[di];
  if(!w||!d)return[];
  return d.exs.map(ex=>({
    lift:ex.l,
    sets:Math.max(1,Math.round(ex.s*w.vm)),
    reps:ex.r,
    targetRpe:Math.min(10,Math.max(6,parseFloat((ex.rpe+w.ro).toFixed(1))))
  }));
}
function getBlock(){return BLOCKS.find(b=>b.id===STATE.activeId)||null;}
function getLastData(lift){
  for(let i=STATE.history.length-1;i>=0;i--)
    for(const ex of(STATE.history[i].exercises||[]))
      if(ex.lift===lift&&ex.weight&&ex.actualRpe)return ex;
  return null;
}
function getSugg(ex){
  const last=getLastData(ex.lift);
  if(last)return calcSuggest(calcE1RM(last.weight,last.reps||ex.reps,last.actualRpe),ex.reps,ex.targetRpe);
  if(STATE.e1rms[ex.lift])return calcSuggest(STATE.e1rms[ex.lift],ex.reps,ex.targetRpe);
  return null;
}
function fmt(date){return new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});}

// ── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag,style,html){
  const e=document.createElement(tag);
  if(style)Object.assign(e.style,style);
  if(html)e.innerHTML=html;
  return e;
}
function div(style,html){return el("div",style,html);}
function btn(text,style,onclick){
  const b=document.createElement("button");
  if(style)Object.assign(b.style,style);
  b.innerHTML=text;
  b.onclick=onclick;
  return b;
}

        border:`1px solid ${active?rpeC(r):"#374151"}`,
        color:active?rpeC(r):"#6b7280",
        borderRadius:"6px",padding:"6px 8px",fontSize:"12px",fontWeight:active?"700":"400",
      },()=>{if(!STATE.log[i])STATE.log[i]={};STATE.log[i].rpe=r;renderTab("session",renderSession);});
      rpeRow.appendChild(rb);
    });
    rpeWrap.appendChild(rpeRow);
    inputRow.appendChild(rpeWrap);

    // e1RM display
    if(computed){
      inputRow.appendChild(div({background:"#1e1b4b",border:"1px solid #312e81",borderRadius:"8px",padding:"8px 14px",textAlign:"center",flexShrink:"0",alignSelf:"flex-end"},
        `<div style="font-size:10px;color:#6b7280">e1RM</div><div style="font-size:20px;font-weight:800;color:#818cf8">${computed}kg</div>`));
    }
    card.appendChild(inputRow);

    // Feedback
    if(rpe){
      let msg="",color="#94a3b8";
      if(rpe>ex.targetRpe+1){msg="⚠️ Bien au-dessus — réduis le poids la prochaine fois";color="#ef4444";}
      else if(rpe>ex.targetRpe){msg="↗️ Légèrement au-dessus — maintiens le poids";color="#eab308";}
      else if(rpe===ex.targetRpe){msg="✅ Parfait ! +2.5 kg la prochaine séance";color="#22c55e";}
      else if(rpe>=ex.targetRpe-1){msg="💪 En dessous — augmente de +2.5 à +5 kg";color="#22c55e";}
      else{msg="🚀 Trop facile — augmente de +5 à +10 kg";color="#818cf8";}
      card.appendChild(div({padding:"7px 10px",borderRadius:"6px",background:`${rpeC(rpe)}10`,borderLeft:`3px solid ${rpeC(rpe)}`,fontSize:"12px",color},msg));
    }
    root.appendChild(card);
  });

  // Save + nav buttons
  const btnRow=div({display:"flex",gap:"8px",flexWrap:"wrap"});
  const saveColor=STATE.saved?"#16a34a":STATE.saving?"#1f2937":block.color;
  const saveText=STATE.saved?"✅ Sauvegardée !":STATE.saving?'<span style="display:inline-block;animation:spin 1s linear infinite">⟳</span> Sauvegarde...':"💾 Sauvegarder la séance";
  const saveBtn=btn(saveText,{flex:"1",minWidth:"150px",background:saveColor,border:"none",borderRadius:"10px",color:"#fff",padding:"13px 16px",fontSize:"13px",fontWeight:"700",letterSpacing:"1px"},saveSession2);
  btnRow.appendChild(saveBtn);
  btnRow.appendChild(btn("← Préc.",{background:"#1f2937",border:"1px solid #374151",color:STATE.week===0?"#374151":"#818cf8",padding:"12px 14px",borderRadius:"8px",fontSize:"12px"},()=>{if(STATE.week>0){STATE.week--;STATE.log={};save("pl_st",{id:STATE.activeId,week:STATE.week,day:STATE.dayIdx});renderTab("session",renderSession);}}));
  btnRow.appendChild(btn("Suiv. →",{background:"#1f2937",border:"1px solid #374151",color:STATE.week>=block.weeks-1?"#374151":"#818cf8",padding:"12px 14px",borderRadius:"8px",fontSize:"12px"},()=>{if(STATE.week<block.weeks-1){STATE.week++;STATE.log={};save("pl_st",{id:STATE.activeId,week:STATE.week,day:STATE.dayIdx});renderTab("session",renderSession);}}));
  root.appendChild(btnRow);
}

function setWeek(i){STATE.week=i;STATE.dayIdx=0;STATE.log={};save("pl_st",{id:STATE.activeId,week:i,day:0});renderTab("session",renderSession);}
window.setWeek=setWeek;

function updateE1rmDisplay(i,ex,old){}

async function saveSession2(){
  const block=getBlock();
  if(!block||STATE.saving)return;
  STATE.saving=true;
  renderTab("session",renderSession);
  const exs=getExs(block,STATE.week,STATE.dayIdx).map((ex,i)=>{
    const lg=STATE.log[i]||{};
    const w=parseFloat(lg.weight)||getSugg(ex)||0;
    const rpe=parseFloat(lg.rpe)||ex.targetRpe;
    return{...ex,weight:w,actualRpe:rpe,e1rm:calcE1RM(w,ex.reps,rpe)};
  });
  const ne={...STATE.e1rms};
  exs.forEach(ex=>{if(ex.weight&&ex.actualRpe)ne[ex.lift]=Math.max(ne[ex.lift]||0,ex.e1rm);});
  const nh=[...STATE.history,{
    date:new Date().toLocaleDateString("fr-FR"),
    blockId:STATE.activeId,blockName:block.name,blockInspo:block.inspo,
    week:STATE.week+1,weekLabel:block.wp[STATE.week]?.lbl,
    day:block.days[STATE.dayIdx]?.name,exercises:exs,
  }];
  STATE.e1rms=ne;STATE.history=nh;STATE.log={};
  save("pl_hist",nh);save("pl_e1rm",ne);
  STATE.saving=false;STATE.saved=true;
  renderTab("session",renderSession);
  setTimeout(()=>{STATE.saved=false;renderTab("session",renderSession);},2500);
}

// ── HISTORY TAB ───────────────────────────────────────────────────────────────
function renderHistory(root){
  root.appendChild(div({fontSize:"18px",fontWeight:"800",letterSpacing:"2px",marginBottom:"16px"},"HISTORIQUE"));
  // e1RM
  const lifts=["Squat","Bench Press","Deadlift"].filter(l=>STATE.e1rms[l]);
  if(lifts.length){
    const grid=div({display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"16px"});
    lifts.forEach(l=>{
      grid.appendChild(div({background:"#111827",border:"1px solid #1f2937",borderRadius:"10px",padding:"12px",textAlign:"center"},
        `<div style="font-size:10px;color:#6b7280;letter-spacing:1px">${l==="Bench Press"?"BENCH":l.toUpperCase()}</div>
         <div style="font-size:22px;font-weight:800;color:#818cf8;margin-top:2px">${STATE.e1rms[l]}<span style="font-size:13px">kg</span></div>
         <div style="font-size:9px;color:#4b5563">e1RM max</div>`));
    });
    root.appendChild(grid);
  }
  if(!STATE.history.length){
    root.appendChild(div({background:"#111827",border:"1px solid #1f2937",borderRadius:"12px",padding:"40px 16px",textAlign:"center"},
      `<div style="font-size:32px;margin-bottom:10px">📋</div><div style="color:#6b7280;font-size:13px">Aucune séance enregistrée.</div>`));
    return;
  }

  // Sessions — affichées du plus récent au plus ancien
  [...STATE.history].map((s,realIdx)=>({s,realIdx})).reverse().forEach(({s,realIdx})=>{
    const bt=BLOCKS.find(b=>b.id===s.blockId);
    const card=div({background:"#111827",border:"1px solid #1f2937",borderRadius:"12px",padding:"14px",marginBottom:"8px"});

    // Header
    const hdr=div({display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px",gap:"8px"});
    const hdrLeft=div({display:"flex",alignItems:"center",gap:"8px",flex:"1",minWidth:"0"});
    hdrLeft.innerHTML=`
      <span style="font-size:16px;flex-shrink:0">${bt?.emoji||"📋"}</span>
      <div style="min-width:0">
        <div style="font-size:13px;font-weight:700;color:${bt?.color||"#818cf8"};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.blockName} — S${s.week} ${s.weekLabel||""}</div>
        <div style="font-size:10px;color:#6b7280">${s.day||""} · ${s.date}</div>
      </div>`;

    // Zone de confirmation inline (cachée au départ)
    const confirmZone=div({display:"none",alignItems:"center",gap:"6px",marginTop:"8px",padding:"8px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.3)",borderRadius:"8px"});
    confirmZone.innerHTML=`<span style="font-size:11px;color:#ef4444;flex:1">Supprimer cette séance ?</span>`;

    const btnOui=document.createElement("button");
    btnOui.textContent="Oui";
    Object.assign(btnOui.style,{background:"#ef4444",border:"none",color:"#fff",padding:"5px 12px",borderRadius:"6px",fontSize:"12px",fontWeight:"700"});
    btnOui.onclick=()=>{
      STATE.history.splice(realIdx,1);
      save("pl_hist",STATE.history);
      renderTab("history",renderHistory);
    };

    const btnNon=document.createElement("button");
    btnNon.textContent="Non";
    Object.assign(btnNon.style,{background:"#374151",border:"none",color:"#e2e8f0",padding:"5px 12px",borderRadius:"6px",fontSize:"12px"});
    btnNon.onclick=()=>{ confirmZone.style.display="none"; delOne.style.opacity="1"; };

    confirmZone.appendChild(btnOui);
    confirmZone.appendChild(btnNon);

    // Bouton poubelle
    const delOne=document.createElement("button");
    delOne.textContent="🗑️";
    Object.assign(delOne.style,{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.3)",color:"#ef4444",padding:"5px 9px",borderRadius:"7px",fontSize:"14px",flexShrink:"0"});
    delOne.onclick=()=>{
      confirmZone.style.display="flex";
      delOne.style.opacity="0.4";
    };

    hdr.appendChild(hdrLeft);
    hdr.appendChild(delOne);
    card.appendChild(hdr);
    card.appendChild(confirmZone);

    // Exercices
    (s.exercises||[]).forEach((ex,j)=>{
      const row=div({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderTop:"1px solid #1f2937",fontSize:"12px",gap:"6px"});
      row.innerHTML=`<span style="color:#d1d5db;flex:1">${ex.lift}</span>
        <span style="color:#e2e8f0;font-weight:600">${ex.weight}kg×${ex.reps}</span>
        <span style="background:${rpeC(ex.actualRpe)}18;color:${rpeC(ex.actualRpe)};padding:1px 7px;border-radius:4px;font-size:11px;font-weight:600">RPE ${ex.actualRpe}</span>
        <span style="color:#818cf8;font-size:11px">e1RM ${ex.e1rm}kg</span>`;
      card.appendChild(row);
    });
    root.appendChild(card);
  });

  // Bouton tout effacer
  const delBtn=btn("🗑️ Effacer tout l'historique",{marginTop:"8px",background:"#1f2937",border:"1px solid #991b1b",color:"#ef4444",padding:"8px 16px",borderRadius:"8px",fontSize:"12px"},()=>{
    if(confirm("Effacer tout l'historique ?")){STATE.history=[];STATE.e1rms={};save("pl_hist",[]);save("pl_e1rm",{});renderTab("history",renderHistory);}
  });
  root.appendChild(delBtn);
}

// ── SETTINGS TAB ─────────────────────────────────────────────────────────────
function renderSettings(root){
  root.appendChild(div({fontSize:"18px",fontWeight:"800",letterSpacing:"2px",marginBottom:"16px"},"CONFIGURATION"));

  // Storage info
  root.appendChild(div({background:"#052e16",border:"1px solid #166534",borderRadius:"10px",padding:"12px 14px",marginBottom:"12px"},
    `<div style="display:flex;align-items:center;gap:10px">
       <div style="width:8px;height:8px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 8px #22c55e"></div>
       <div>
         <div style="font-size:13px;font-weight:700;color:#22c55e">Stockage local actif</div>
         <div style="font-size:11px;color:#166534;margin-top:2px">Données sauvegardées sur cet appareil. Reste dans Safari si tu ajoutes le fichier à l'écran d'accueil.</div>
       </div>
     </div>`));

  // e1RM
  const eCard=div({background:"#111827",border:"1px solid #1f2937",borderRadius:"12px",padding:"16px",marginBottom:"12px"});
  eCard.appendChild(div({fontSize:"13px",fontWeight:"700",color:"#818cf8",marginBottom:"4px"},"🏆 Maximas (e1RM)"));
  eCard.appendChild(div({fontSize:"11px",color:"#6b7280",marginBottom:"12px"},"Entre tes maximas pour calibrer les suggestions dès le départ."));
  ["Squat","Bench Press","Deadlift"].forEach(l=>{
    const row=div({display:"flex",alignItems:"center",gap:"10px",marginBottom:"10px"});
    row.appendChild(div({color:"#d1d5db",fontSize:"13px",flex:"1"},l));
    const inp=document.createElement("input");
    inp.type="number";inp.step="2.5";inp.value=STATE.e1rms[l]||"";inp.placeholder="kg";
    Object.assign(inp.style,{width:"80px",background:"#0d1117",border:"1px solid #374151",borderRadius:"8px",color:"#e2e8f0",padding:"8px 10px",fontSize:"15px",fontWeight:"600"});
    inp.oninput=e=>{STATE.e1rms[l]=parseFloat(e.target.value)||0;save("pl_e1rm",STATE.e1rms);};
    row.appendChild(inp);
    row.appendChild(div({color:"#4b5563",fontSize:"12px"},"kg"));
    eCard.appendChild(row);
  });
  root.appendChild(eCard);

  // RPE guide
  const rCard=div({background:"#111827",border:"1px solid #1f2937",borderRadius:"12px",padding:"16px",marginBottom:"12px"});
  rCard.appendChild(div({fontSize:"13px",fontWeight:"700",color:"#818cf8",marginBottom:"12px"},"📖 Guide RPE (Tuchscherer)"));
  [[6,"4+ reps — Échauffement"],[6.5,"3-4 reps — Très facile"],[7,"3 reps — Modéré"],[7.5,"2-3 reps — Confortable"],[8,"2 reps — Difficile"],[8.5,"1-2 reps — Très difficile"],[9,"1 rep — Presque max"],[9.5,"0-1 rep — Proche du max"],[10,"0 rep — Maximum absolu"]].forEach(([r,d])=>{
    const row=div({display:"flex",alignItems:"center",gap:"10px",padding:"5px 0",borderBottom:"1px solid #1f2937"});
    row.innerHTML=`<span style="background:${rpeC(r)}18;color:${rpeC(r)};padding:2px 8px;border-radius:5px;font-size:12px;font-weight:700;min-width:36px;text-align:center">${r}</span>
      <span style="font-size:12px;color:#6b7280">${d}</span>`;
    rCard.appendChild(row);
  });
  rCard.appendChild(div({marginTop:"12px",padding:"12px",background:"#0d1117",borderRadius:"8px",fontSize:"11px",color:"#6b7280",lineHeight:"1.7"},
    "💡 <strong style='color:#9ca3af'>Autorégulation :</strong> L'app calcule ton e1RM estimé à chaque séance. Si ton RPE réel dépasse la cible, le poids suggéré est réduit automatiquement — et inversement."));
  root.appendChild(rCard);

  // Block list
  const bCard=div({background:"#111827",border:"1px solid #1f2937",borderRadius:"12px",padding:"16px"});
  bCard.appendChild(div({fontSize:"13px",fontWeight:"700",color:"#818cf8",marginBottom:"12px"},"🏆 Les 10 programmes"));
  BLOCKS.forEach(b=>{
    const lc=LEVEL_COLOR[b.level]||"#818cf8";
    const row=div({display:"flex",alignItems:"center",gap:"10px",padding:"8px 0",borderBottom:"1px solid #1f2937"});

function openModal(id){
  const b=BLOCKS.find(x=>x.id===id);
  if(!b)return;
  const overlay=document.getElementById("modal-overlay");
  const box=document.getElementById("modal-box");
  const content=document.getElementById("modal-content");
  box.style.borderColor=b.color;
  const lc=LEVEL_COLOR[b.level]||"#818cf8";
  let html=`<div style="width:36px;height:4px;background:#374151;border-radius:2px;margin:0 auto 16px"></div>
    <div style="background:${b.color}15;border:1px solid ${b.color}30;border-radius:8px;padding:6px 12px;margin-bottom:14px;display:inline-flex;align-items:center;gap:6px">
      <span style="font-size:11px;color:${b.color}">Inspiré de :</span>
      <span style="font-size:12px;color:#e2e8f0;font-weight:700">${b.inspo}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:28px">${b.emoji}</span>
      <div>
        <div style="font-size:18px;font-weight:800;color:${b.color};letter-spacing:1px">${b.name}</div>
        <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
          <span style="background:${lc}20;border:1px solid ${lc}40;color:${lc};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">${b.level}</span>
          <span style="background:${b.color}20;border:1px solid ${b.color}40;color:${b.color};border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">${b.weeks} semaines</span>
          <span style="background:#6b728020;border:1px solid #6b728040;color:#6b7280;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600">3j / sem</span>
        </div>
      </div>
    </div>
    <div style="font-size:13px;color:#9ca3af;line-height:1.7;margin-bottom:${b.notes?'10px':'16px'};padding:12px;background:#0d1117;border-radius:8px;border-left:3px solid ${b.color}60">${b.desc}</div>
    ${b.notes?`<div style="font-size:11px;line-height:1.8;margin-bottom:16px;padding:12px;background:#052e16;border-radius:8px;border-left:3px solid #22c55e;color:#86efac">${b.notes.replace(/\n/g,'<br>')}</div>`:''}
    <div style="font-size:11px;color:#6b7280;letter-spacing:2px;margin-bottom:8px">STRUCTURE</div>
    <div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:16px">`;
  b.wp.forEach((w,i)=>{
    const bg=w.ro>0?"#450a0a":w.ro<0?"#052e16":"#1e1b4b";
    const bc=w.ro>0?"#991b1b":w.ro<0?"#166534":"#3730a3";
    const tc=w.ro>0?"#ef4444":w.ro<0?"#22c55e":"#818cf8";
    html+=`<div style="background:${bg};border:1px solid ${bc};border-radius:8px;padding:8px 10px;text-align:center;flex-shrink:0;min-width:64px">
      <div style="font-size:9px;color:#6b7280">S${i+1}</div>
      <div style="font-size:11px;color:#e2e8f0;margin-top:1px">${w.lbl}</div>
      <div style="font-size:9px;color:${tc};margin-top:2px">${w.ro>0?"+":""}${w.ro!==0?"RPE"+w.ro:"Base"} ×${w.vm}</div>
    </div>`;
  });
  html+=`</div><div style="font-size:11px;color:#6b7280;letter-spacing:2px;margin-bottom:8px">JOURS</div>`;
  b.days.forEach(d=>{
    html+=`<div style="background:#0d1117;border:1px solid #1f2937;border-radius:8px;padding:12px;margin-bottom:6px">
      <div style="font-size:12px;font-weight:600;color:${b.color};margin-bottom:8px">${d.name} — ${d.label}</div>`;

        <span style="color:#d1d5db">${ex.l}</span>
        <span style="color:${rpeC(ex.rpe)};font-weight:600">${ex.s}×${ex.r} @ RPE ${ex.rpe}</span>

    });
    html+=`</div>`;
  });
  content.innerHTML=html;
  // Use button
  const useBtn=btn("▶ UTILISER CE BLOC",{marginTop:"12px",width:"100%",background:b.color,border:"none",color:"#fff",padding:"14px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",letterSpacing:"1px"},()=>{
    STATE.activeId=b.id;STATE.week=0;STATE.dayIdx=0;STATE.log={};
    save("pl_st",{id:b.id,week:0,day:0});
    closeModal();goTab("session");
  });
  content.appendChild(useBtn);
  overlay.style.display="flex";
}
